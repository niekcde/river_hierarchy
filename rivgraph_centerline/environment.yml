name: river-hierarchy-rivgraph
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip

  # RivGraph geospatial/scientific stack.
  - numpy>=1.26,<2
  - scipy>=1.11,<1.14
  - pandas>=2.2,<2.3
  - matplotlib>=3.8,<3.11
  - networkx>=2.8,<3.3
  - scikit-image>=0.22,<0.25
  - shapely>=2.1,<2.2
  - geopandas>=1.1,<1.2
  - pyproj>=3.6,<3.8
  - rasterio>=1.4,<1.5
  - pyogrio>=0.11.1,<0.13
  - contextily>=1.6,<2
  - pillow
  - pyyaml
  - loguru
  - fastdtw

  # Workflow development.
  - pytest>=8,<9
  - jupyterlab
  - ipykernel

  - pip:
      # Create the fork on GitHub first:
      # https://github.com/VeinsOfTheEarth/RivGraph -> https://github.com/niekcde/RivGraph
      # Pin this to a commit hash once the workflow is reproducible.
      - git+ssh://git@github.com/niekcde/RivGraph.git@river-hierarchy#egg=rivgraph
